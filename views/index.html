<!DOCTYPE html>
<html lang="es-CO">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#222222">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/img/pwa-192.png">
    <link rel="stylesheet" href="/node_modules/bootstrap-icons/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/node_modules/normalize.css/normalize.css" />
    <link rel="stylesheet" href="/static/css/index.view.css">
    <link rel="shortcut icon" href="/static/img/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/node_modules/sweetalert2/dist/sweetalert2.min.css">
    <script src="/node_modules/jquery/dist/jquery.min.js"></script>
    <script src="/node_modules/sweetalert2/dist/sweetalert2.all.js"></script>
    <title>Remote Controller</title>
</head>

<body>
    <main class="container-web-movil">
        <div class="content-view-all-movil">
            <section class="container-modules container-modules-1">
                <div class="form-group">
                    <label for="brillo">Brillo</label>
                    <input type="range" class="form-control-range" id="brillo" min="0" max="100" step="1">
                    <span class="text-quantity-brillo">50</span>
                </div>
                <div class="form-group">
                    <label for="contraste">Contraste</label>
                    <input type="range" class="form-control-range" id="contraste" min="0" max="100" step="1">
                    <span class="text-quantity-contraste">50</span>
                </div>
                <div class="form-group">
                    <label for="volumen">Volumen</label>
                    <input type="range" class="form-control-range" id="volumen" min="0" max="100" step="1">
                    <div class="volume-data-options">
                        <span class="text-quantity-volumen">50</span>
                        <button class="icon-volumen" title="Silenciar/Activar sonido">
                            <i class="bi bi-volume-mute"></i>
                        </button>
                    </div>

                </div>
            </section>
            <section class="container-modules container-modules-2">
                <div class="screen-container">
                    <button class="btn btn-primary btn-screen" id="pantallaPrincipal" title="Solo Pantalla Principal">
                        <img src="./static/img/solopc.png" alt="solo pc">
                        <span class="text-screen">Principal</span>
                    </button>
                    <button class="btn btn-primary btn-screen" id="pantallaSecundaria" title="Solo Pantalla Secundaria">
                        <img src="./static/img/secundaria.png" alt="secundaria">
                        <span class="text-screen">Secundaria</span>
                    </button>
                    <button class="btn btn-primary btn-screen" id="ampliar" title="Ampliar Pantalla Principal">
                        <img src="./static/img/ampliar.png" alt="ampliar">
                        <span class="text-screen">Ampliar</span>
                    </button>
                    <button class="btn btn-primary btn-screen" id="duplicar" title="Duplicar Pantalla Principal">
                        <img src="./static/img/duplicar.png" alt="duplicar">
                        <span class="text-screen">Duplicar</span>
                    </button>
                </div>
            </section>
            <section class="container-modules container-modules-3">
                <div class="app-container">
                    <button class="btn btn-primary btn-pc" id="app-cerrar" title="Cerrar app">
                        <i class="bi bi-power"></i>
                        <span class="text-pc">Cerrar</span>
                    </button>
                    <button class="btn btn-primary btn-pc" id="app-reiniciar" title="Reiniciar">
                        <i class="bi bi-arrow-repeat"></i>
                        <span class="text-pc">Reiniciar</span>
                    </button>
                    <button class="btn btn-primary btn-pc" id="app-ocultar" title="Ocultar app">
                        <i class="bi bi-eye-slash"></i>
                        <span class="text-pc">Ocultar</span>
                    </button>
                    <button class="btn btn-primary btn-pc" id="app-mostrar" title="Mostrar app">
                        <i class="bi bi-eye"></i>
                        <span class="text-pc">Mostrar</span>
                    </button>
                    <!-- Boton de transferir archivos -->
                    <button class="btn btn-primary btn-pc" id="app-transferir-archivos" title="Transferir archivos">
                        <i class="bi bi-file-earmark-arrow-up"></i>
                        <span class="text-pc">Transferir</span>
                    </button>
                    <!-- boton para programar apagdo -->
                    <button class="btn btn-primary btn-pc" id="app-programar-apagado" title="Programar apagado">
                        <i class="bi bi-clock"></i>
                        <span class="text-pc">Programar</span>
                    </button>
                </div>
            </section>
            <section class="container-modules container-modules-4">
                <button class="btn-add-app-direct" title="Agregar aplicación">
                    <i class="bi bi-plus"></i>
                </button>
                <div class="apps-container">

                </div>
            </section>
            <section class="container-modules container-modules-5">
                <div class="mouse-config-card">
                    <h2 class="mouse-config-title">Configuración del mouse</h2>
                    <div class="mouse-config-group">
                        <div class="mouse-config-label">
                            <label for="mouse-pointer-speed">Velocidad del puntero</label>
                            <span class="mouse-config-value" data-role="pointer-indicator">2.5x</span>
                        </div>
                        <input type="range" id="mouse-pointer-speed" class="mouse-config-slider" min="0.5" max="6"
                            step="0.1" value="2.5" aria-describedby="mouse-pointer-hint">
                        <small id="mouse-pointer-hint" class="mouse-config-hint">Ajusta la rapidez del cursor</small>
                    </div>
                    <div class="mouse-config-group">
                        <div class="mouse-config-label">
                            <label for="mouse-scroll-speed">Velocidad del scroll</label>
                            <span class="mouse-config-value" data-role="scroll-indicator">1.0x</span>
                        </div>
                        <input type="range" id="mouse-scroll-speed" class="mouse-config-slider" min="0.5" max="18"
                            step="0.1" value="1.0" aria-describedby="mouse-scroll-hint">
                        <small id="mouse-scroll-hint" class="mouse-config-hint">Define qué tan rápido se
                            desplaza</small>
                    </div>
                    <div class="mouse-config-actions">
                        <button type="button" class="mouse-config-btn" id="mouse-config-reset">
                            <i class="bi bi-arrow-counterclockwise"></i>
                            <span>Restablecer</span>
                        </button>
                        <span class="mouse-config-status" data-role="config-status" role="status"
                            aria-live="polite"></span>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <aside class="container-teclados">
        <div class="teclado"></div>
    </aside>

    <!-- Touchpad Virtual para control del mouse -->
    <aside class="container-touchpad">
        <div class="touchpad-header">
            <span class="touchpad-title">Touchpad</span>
            <!-- boton para indicar que se va a seleccionar como si fuese un click izquierdo presionado -->
            <button class="btn-touchpad-hold" title="Mantener Click Izquierdo">
                <i class="bi bi-hand-index-thumb"></i>
            </button>
            <button class="btn-touchpad-close" title="Cerrar Touchpad">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="touchpad-area" id="touchpad">
            <div class="touchpad-hint">
                <i class="bi bi-hand-index"></i>
                <span>Desliza para mover el cursor</span>
            </div>
        </div>
        <div class="touchpad-buttons">
            <button class="touchpad-btn" id="touchpad-left-click" title="Click Izquierdo">
                <i class="bi bi-hand-index-thumb"></i>
                <span>L</span>
            </button>
            <button class="touchpad-btn" id="touchpad-scroll-toggle" title="Modo Scroll">
                <i class="bi bi-arrows-vertical"></i>
                <span>S</span>
            </button>
            <button class="touchpad-btn" id="touchpad-right-click" title="Click Derecho">
                <i class="bi bi-hand-index-thumb"></i>
                <span>R</span>
            </button>
        </div>
    </aside>

    <button class="btn-teclado-show" title="Teclado Virtual">
        <i class="bi bi-keyboard"></i>
    </button>

    <button class="btn-voice-show" id="btn-voice-show" title="Dictado por voz">
        <i class="bi bi-mic"></i>
    </button>

    <button class="btn-touchpad-show" title="Touchpad Virtual">
        <i class="bi bi-cursor"></i>
    </button>
    <aside class="container-option-pc">
        <div class="container-option-pc-1">
            <button class="btn btn-primary btn-pc" id="apagar" title="Apagar">
                <i class="bi bi-power"></i>
                <span class="text-pc">Apagar</span>
            </button>
            <button class="btn btn-primary btn-pc" id="reiniciar" title="Reiniciar">
                <i class="bi bi-arrow-repeat"></i>
                <span class="text-pc">Reiniciar</span>
            </button>
            <!-- <button class="btn btn-primary btn-pc" id="close_session" title="Cerrar sesión">
                <i class="bi bi-box-arrow-right"></i>
                <span class="text-pc">Cerrar Sesión</span>
            </button>
            <button class="btn btn-primary btn-pc" id="suspender" title="Suspender">
                <i class="bi bi-moon"></i>
                <span class="text-pc">Suspender</span>
            </button> -->
        </div>
    </aside>
    <button class="btn-otion-pc-show" title="Opciones de energía">
        <i class="bi bi-power"></i>
    </button>

    <aside class="select-dir">
        <div class="container-folders-dir">
            <div class="header-modal header-select-dir">
                <button class="btn-return-modal-dir" id="return-modal-dir" title="Regresar">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <input type="text" id="path-selected" readonly placeholder="No ha seleccionado archivo"
                    class="form-control">
                <button class="btn-close-modal-dir" id="close-modal-dir" title="Cerrar">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="body-modal body-select-dir">

            </div>
        </div>
    </aside>

    <aside class="modal-transfer" id="modal-transfer">
        <div class="transfer-panel">
            <div class="transfer-header">
                <button class="btn-transfer-back" id="transfer-back" title="Regresar carpeta">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <button class="btn-transfer-close" id="transfer-close" title="Cerrar">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="transfer-body" id="transfer-body"></div>
            <div class="transfer-path-box">
                <input type="text" id="transfer-current-path" readonly placeholder="Ruta seleccionada">
            </div>
            <div class="transfer-footer">
                <button class="btn-transfer-select" id="transfer-select-files">Seleccionar ficheros</button>
                <button class="btn-transfer-cancel" id="transfer-cancel">Cancelar</button>
            </div>
            <input type="file" id="transfer-file-input" multiple hidden>
        </div>
    </aside>

    <aside class="modal-add-app">
        <div class="container-add-app">
            <div class="header-modal">
                <button class="btn-close-modal-add-app" id="close-modal-add-app" title="Cerrar">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="body-modal">
                <div class="form-group">
                    <label for="name-app">Nombre de la app</label>
                    <input type="text" id="name-app" class="form-control" placeholder="Nombre de la app">
                </div>
                <div class="form-group">
                    <label for="type-app">Tipo de app</label>
                    <select id="type-app" class="form-control">
                        <option value="web">Web</option>
                        <option value="desktop">Escritorio</option>
                    </select>
                </div>
                <div class="form-group form-web-path">
                    <label for="path-app">Ruta de la app</label>
                    <input type="text" id="path-app-web" class="form-control" placeholder="Ruta de la app">
                </div>
                <div class="form-group form-desk-path d-none">
                    <label for="path-app">Ruta de la app</label>
                    <button class="btn btn-primary btn-select-dir" id="select-dir-app-desk">Ruta de la app</button>
                </div>
                <!-- icono -->
                <div class="form-group">
                    <label for="icon-app">Icono de la app</label>
                    <input type="file" id="icon-app" class="form-control">
                </div>
            </div>
            <div class="footer-modal">
                <button class="btn btn-primary btn-add-app" id="add-app">Agregar</button>
                <button class="btn btn-primary btn-cancel" id="cancel-add-app">Cancelar</button>
            </div>
        </div>
    </aside>
    <aside class="modal-power-off">
        <!-- modal para seleccionar la hora se va a apagar -->
        <div class="container-power-off">
            <div class="header-modal header-power-off">
                <button class="btn-close-modal-power-off" id="close-modal-power-off" title="Cerrar">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="body-modal body-power-off">
                <div class="form-group">
                    <label for="time-power-off">Selecciona la hora para apagar el PC</label>
                    <input type="time" id="time-power-off" class="form-control">
                </div>
            </div>
            <div class="footer-modal footer-power-off">
                <button class="btn btn-primary btn-set-power-off" id="set-power-off">Programar Apagado</button>
                <button class="btn btn-primary btn-cancel-power-off" id="cancel-power-off">Cancelar</button>
            </div>
        </div>
        <div class="overlay"></div>
    </aside>
    <div class="loadding">
        <div class="circle">
            <div class="dot1"></div>
            <div class="dot2"></div>
        </div>
    </div>
    <script src="/static/js/const.js"></script>
    <script src="/static/js/fx.js"></script>
    <script src="/static/js/fx-teclado.js"></script>
    <script src="/static/js/fx-mouse.js"></script>
    <script src="/static/js/teclado.js"></script>
    <script src="/static/js/index.js"></script>
    <script src="/static/js/controller_app.js"></script>
    <script src="/static/js/transfer.js"></script>
    <script src="/static/js/voice-dictation.js"></script>
    <script src="/static/js/pwa.js"></script>
    <script src="/static/js/powerOff.js"></script>
    <script src="/static/js/mouse.config.js"></script>

</body>

</html>
