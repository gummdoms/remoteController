name: Build And Release Desktop Apps

on:
    push:
        branches: [main]
    release:
        types: [published]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-windows-installer:
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        runs-on: windows-2022

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup MSVC toolchain
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: x64

            - name: Install dependencies
              shell: bash
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm install

            - name: Build native modules
              shell: bash
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run build:native

            - name: Build styles
              shell: bash
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run build:sass

            - name: Build Windows installer
              shell: bash
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run dist:win -- --publish never

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v4
              with:
                  name: windows-installer
                  path: |
                      dist/*.exe
                      DesktopApp/dist/*.exe

    build-linux-appimage:
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential python3 make g++ libx11-dev libxtst-dev libxi-dev

            - name: Install dependencies
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm install

            - name: Build native modules
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run build:native

            - name: Build styles
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run build:sass

            - name: Build Linux AppImage
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run dist:linux -- --publish never

            - name: Upload Linux artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linux-appimage
                  path: |
                      dist/*.AppImage
                      DesktopApp/dist/*.AppImage

    build-archlinux-package:
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        container: archlinux:latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Arch dependencies
              run: |
                  pacman -Syu --noconfirm
                  pacman -S --noconfirm nodejs npm base-devel python make gcc pkgconf \
                    libx11 libxtst libxext libxrandr gtk3 nss alsa-lib fuse2

            - name: Install dependencies
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm install

            - name: Build native modules
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run build:native

            - name: Build styles
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run build:sass

            - name: Build Linux AppImage required for Arch package
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  npm run dist:linux -- --publish never

            - name: Build Arch Linux package
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  pacman -S --noconfirm shadow sudo
                  if ! id -u builder >/dev/null 2>&1; then
                    useradd -m builder
                  fi
                  chown -R builder:builder "$PWD/$APP_DIR"
                  su builder -c "cd '$PWD/$APP_DIR' && npm run dist:arch:pkg"
                  su builder -c "cd '$PWD/$APP_DIR' && npm run dist:arch:publish"

            - name: Upload Arch Linux artifact
              uses: actions/upload-artifact@v4
              with:
                  name: archlinux-package
                  path: |
                      dist/*.pkg.tar.zst
                      dist/datalake-upload/**
                      DesktopApp/dist/*.pkg.tar.zst
                      DesktopApp/dist/datalake-upload/**

    publish-auto-release-main:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        needs:
            [
                build-windows-installer,
                build-linux-appimage,
                build-archlinux-package,
            ]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download Windows artifact
              uses: actions/download-artifact@v4
              with:
                  name: windows-installer
                  path: release-assets/windows

            - name: Download Linux artifact
              uses: actions/download-artifact@v4
              with:
                  name: linux-appimage
                  path: release-assets/linux

            - name: Download Arch Linux artifact
              uses: actions/download-artifact@v4
              with:
                  name: archlinux-package
                  path: release-assets/arch

            - name: Prepare Arch repo files for upload
              run: |
                  if [[ -d release-assets/arch/datalake-upload ]]; then
                    mkdir -p release-assets/arch/repo
                    cp -a release-assets/arch/datalake-upload/. release-assets/arch/repo/
                  fi

            - name: Setup Node.js for data lake upload
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Upload assets to data lake
              env:
                  DATA_LAKE_URL: ${{ secrets.DATA_LAKE_URL }}
                  DATA_LAKE_USER: ${{ secrets.DATA_LAKE_USER }}
                  DATA_LAKE_PASSWORD: ${{ secrets.DATA_LAKE_PASSWORD }}
                  DATA_LAKE_STORAGE_PATH: ${{ secrets.DATA_LAKE_STORAGE_PATH }}
                  RELEASES_BASE: ${{ secrets.RELEASES_BASE }}
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  node scripts/upload-ci-assets.js "$GITHUB_WORKSPACE/release-assets"

            - name: Build release notes and update README
              id: release_meta
              env:
                  HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi

                  VERSION=$(node -p "require('./${APP_DIR}/package.json').version")
                  TAG="v${VERSION}-main.${GITHUB_RUN_NUMBER}"
                  NAME="Release v${VERSION} (build ${GITHUB_RUN_NUMBER})"

                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
                  echo "name=${NAME}" >> "$GITHUB_OUTPUT"

                  PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
                  if [[ -n "$PREV_TAG" ]]; then
                    LOG_SOURCE="$PREV_TAG..HEAD"
                  else
                    LOG_SOURCE="HEAD"
                  fi

                  CHANGES=$(git log $LOG_SOURCE --pretty=format:'- %s (%h)' -n 20)
                  if [[ -z "$CHANGES" ]]; then
                    CHANGES='- Sin cambios detectados en commits recientes.'
                  fi

                  {
                    echo "## Release Documentado Por Copilot"
                    echo ""
                    echo "- Rama: main"
                    echo "- Commit: ${GITHUB_SHA}"
                    echo "- Mensaje principal: ${HEAD_COMMIT_MESSAGE}"
                    echo "- Fecha: $(date -u '+%Y-%m-%d %H:%M UTC')"
                    echo ""
                    echo "### Mejoras detectadas"
                    echo "$CHANGES"
                    echo ""
                    echo "### Artefactos"
                    echo "- Windows: instalador NSIS (.exe)"
                    echo "- Linux: AppImage"
                    echo "- Arch Linux: .pkg.tar.zst"
                  } > release-body.md

                  README_PATH="${APP_DIR}/README.md"
                  README_BLOCK=$(cat release-body.md)
                  START='<!-- AUTO-RELEASE-NOTES:START -->'
                  END='<!-- AUTO-RELEASE-NOTES:END -->'

                  if grep -q "$START" "$README_PATH"; then
                    awk -v start="$START" -v end="$END" -v block="$README_BLOCK" '
                      $0 == start { print; print block; skip=1; next }
                      $0 == end { skip=0; print; next }
                      !skip { print }
                    ' "$README_PATH" > "${README_PATH}.tmp"
                    mv "${README_PATH}.tmp" "$README_PATH"
                  else
                    {
                      echo ""
                      echo "$START"
                      cat release-body.md
                      echo "$END"
                    } >> "$README_PATH"
                  fi

            - name: Commit README update
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  README_PATH="${APP_DIR}/README.md"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  if ! git diff --quiet "$README_PATH"; then
                    git add "$README_PATH"
                    git commit -m "docs: actualizar resumen automatico de release [skip ci]"
                    if ! git push; then
                      echo "No se pudo hacer push por protección de rama. Se continúa sin actualizar README en main." 
                    fi
                  fi

            - name: Verify downloaded assets
              run: |
                  echo "Assets descargados:" 
                  find release-assets -type f | sort || true

            - name: Create release in GitHub
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release_meta.outputs.tag }}
                  name: ${{ steps.release_meta.outputs.name }}
                  target_commitish: main
                  body_path: release-body.md
                  generate_release_notes: true
                  files: |
                      release-assets/**/*.exe
                      release-assets/**/*.AppImage
                      release-assets/**/*.pkg.tar.zst
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    attach-assets-to-published-release:
        if: github.event_name == 'release'
        needs:
            [
                build-windows-installer,
                build-linux-appimage,
                build-archlinux-package,
            ]
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download Windows artifact
              uses: actions/download-artifact@v4
              with:
                  name: windows-installer
                  path: release-assets/windows

            - name: Download Linux artifact
              uses: actions/download-artifact@v4
              with:
                  name: linux-appimage
                  path: release-assets/linux

            - name: Download Arch Linux artifact
              uses: actions/download-artifact@v4
              with:
                  name: archlinux-package
                  path: release-assets/arch

            - name: Prepare Arch repo files for upload
              run: |
                  if [[ -d release-assets/arch/datalake-upload ]]; then
                    mkdir -p release-assets/arch/repo
                    cp -a release-assets/arch/datalake-upload/. release-assets/arch/repo/
                  fi

            - name: Setup Node.js for data lake upload
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Upload assets to data lake
              env:
                  DATA_LAKE_URL: ${{ secrets.DATA_LAKE_URL }}
                  DATA_LAKE_USER: ${{ secrets.DATA_LAKE_USER }}
                  DATA_LAKE_PASSWORD: ${{ secrets.DATA_LAKE_PASSWORD }}
                  DATA_LAKE_STORAGE_PATH: ${{ secrets.DATA_LAKE_STORAGE_PATH }}
                  RELEASES_BASE: ${{ secrets.RELEASES_BASE }}
              run: |
                  APP_DIR="."
                  if [[ -f "DesktopApp/package.json" ]]; then APP_DIR="DesktopApp"; fi
                  cd "$APP_DIR"
                  node scripts/upload-ci-assets.js "$GITHUB_WORKSPACE/release-assets"

            - name: Build release notes from recent commits
              run: |
                  CHANGES=$(git log --pretty=format:'- %s (%h)' -n 20)
                  {
                    echo "## Release Documentado Por Copilot"
                    echo ""
                    echo "### Mejoras detectadas"
                    echo "$CHANGES"
                  } > release-body.md

            - name: Verify downloaded assets
              run: |
                  echo "Assets descargados:" 
                  find release-assets -type f | sort || true

            - name: Attach artifacts and update release notes
              uses: softprops/action-gh-release@v2
              with:
                  body_path: release-body.md
                  append_body: true
                  files: |
                      release-assets/**/*.exe
                      release-assets/**/*.AppImage
                      release-assets/**/*.pkg.tar.zst
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
